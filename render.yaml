services:
  - type: web
    name: running-coach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 2 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    disk:
      name: running-coach-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATA_DIR
        value: /var/data
      - key: METRICS_FILE
        value: /var/data/metrics.json
      - key: RUNALYZE_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
