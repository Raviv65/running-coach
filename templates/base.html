<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Running coach{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site">
    <div class="inner">
      <span class="brand">Running coach</span>
      <nav>
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">Today</a>
        <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' else '' }}">History</a>
        <a href="{{ url_for('activity_log') }}" class="{{ 'active' if request.endpoint == 'activity_log' else '' }}">Activities</a>
        <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' else '' }}">Settings</a>
        <button id="sync-btn" onclick="syncNow()" style="margin-left:16px;padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-weight:600;font-size:0.88rem;cursor:pointer;">🔄 Sync</button>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  async function syncNow() {
    const btn = document.getElementById('sync-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Syncing…';
    try {
      // Pipeline runs synchronously on Cloud Run — just wait for the response.
      const r = await fetch('/sync-now', { method: 'POST' });
      const d = await r.json();
      if (d.ok) {
        btn.textContent = '✅ Done';
        setTimeout(() => location.reload(), 800);
      } else {
        btn.textContent = '❌ Failed';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '🔄 Sync'; }, 3000);
      }
    } catch (e) {
      btn.textContent = '❌ Error';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '🔄 Sync'; }, 3000);
    }
  }
  </script>
</body>
</html>
