<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Running coach{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site">
    <div class="inner">
      <span class="brand">Running coach</span>
      <nav>
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">Today</a>
        <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' else '' }}">History</a>
        <a href="{{ url_for('activity_log') }}" class="{{ 'active' if request.endpoint == 'activity_log' else '' }}">Activities</a>
        <button id="sync-btn" onclick="syncNow()" style="margin-left:16px;padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-weight:600;font-size:0.88rem;cursor:pointer;">🔄 Sync</button>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  function syncNow() {
    const btn = document.getElementById('sync-btn');
    btn.disabled = true;

    // Capture current last_sync before we start, so we can detect when it changes
    let prevSync = null;
    fetch('/api/last-sync')
      .then(r => r.json())
      .then(d => { prevSync = d.last_sync; })
      .catch(() => {})
      .finally(() => {
        btn.textContent = '⏳ Syncing…';
        fetch('/sync-now', { method: 'POST' }).catch(() => {});

        // Poll every 8s for up to 3 minutes
        let elapsed = 0;
        const maxWait = 180;
        const interval = setInterval(() => {
          elapsed += 8;
          const remaining = maxWait - elapsed;
          btn.textContent = `⏳ ${remaining}s…`;

          fetch('/api/last-sync')
            .then(r => r.json())
            .then(d => {
              if (d.last_sync && d.last_sync !== prevSync) {
                clearInterval(interval);
                btn.textContent = '✅ Done';
                setTimeout(() => location.reload(), 800);
              } else if (elapsed >= maxWait) {
                clearInterval(interval);
                btn.textContent = '🔄 Sync';
                btn.disabled = false;
                location.reload();
              }
            })
            .catch(() => {
              if (elapsed >= maxWait) {
                clearInterval(interval);
                btn.textContent = '🔄 Sync';
                btn.disabled = false;
              }
            });
        }, 8000);
      });
  }
  </script>
</body>
</html>
