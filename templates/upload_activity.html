{% extends "base.html" %}
{% block title %}Upload Activity — Running Coach{% endblock %}
{% block content %}
<h1>Upload Activity</h1>
<p class="sub">Export the JSON file from the Suunto app and upload it here.</p>
<div class="card" style="max-width:480px; padding:28px;">
  <div id="drop-zone" style="border:2px dashed var(--border); border-radius:10px; padding:40px 20px; text-align:center; cursor:pointer; transition:border-color 0.2s;">
    <div style="font-size:2rem; margin-bottom:10px;">📂</div>
    <div style="font-weight:600; margin-bottom:6px;">Drop Suunto JSON here</div>
    <div style="color:var(--muted); font-size:0.88rem; margin-bottom:16px;">or click to browse</div>
    <input type="file" id="file-input" accept=".json" style="display:none;">
    <button onclick="document.getElementById('file-input').click()" style="background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-weight:600;cursor:pointer;">Choose File</button>
  </div>
  <div id="status" style="margin-top:20px; display:none;"></div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const status = document.getElementById('status');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor='#2563eb'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor='var(--border)'; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor='var(--border)'; handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file) return;
  status.style.display = 'block';
  status.innerHTML = '<p style="color:var(--muted)">⏳ Processing...</p>';
  const fd = new FormData();
  fd.append('file', file);
  fetch('/upload-activity', { method:'POST', body:fd })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        const r = data.result;
        status.innerHTML = `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px;">
            <div style="font-weight:700;color:#15803d;margin-bottom:8px;">✅ Activity logged</div>
            <div><b>Date:</b> ${r.date}</div>
            <div><b>Distance:</b> ${r.distance_km} km</div>
            <div><b>Duration:</b> ${r.duration_min} min</div>
            <div><b>TRIMP:</b> ${r.trimp}</div>
            <div><b>PTE:</b> ${r.peak_training_effect}</div>
            <div><b>Recovery:</b> ${r.recovery_time_hrs}h</div>
            <div style="margin-top:12px;"><a href="/activity" style="color:#2563eb;font-weight:600;">← Back to Activity Log</a></div>
          </div>`;
      } else {
        status.innerHTML = `<p style="color:#dc2626;">❌ Error: ${data.error}</p>`;
      }
    })
    .catch(() => { status.innerHTML = '<p style="color:#dc2626;">❌ Upload failed.</p>'; });
}
</script>
{% endblock %}
